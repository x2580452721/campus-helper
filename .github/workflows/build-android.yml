name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies (miniapp)
        working-directory: ./miniapp
        run: npm install

      - name: Build H5
        working-directory: ./miniapp
        env:
          TARO_APP_SUPABASE_URL: ${{ secrets.TARO_APP_SUPABASE_URL }}
          TARO_APP_SUPABASE_ANON_KEY: ${{ secrets.TARO_APP_SUPABASE_ANON_KEY }}
          TARO_APP_AMAP_KEY: ${{ secrets.TARO_APP_AMAP_KEY }}
          TARO_APP_AMAP_WEB_KEY: ${{ secrets.TARO_APP_AMAP_WEB_KEY }}
          TARO_APP_AMAP_JS_KEY: ${{ secrets.TARO_APP_AMAP_JS_KEY }}
          TARO_APP_AMAP_SECURITY_KEY: ${{ secrets.TARO_APP_AMAP_SECURITY_KEY }}
        run: npm run build:h5

      - name: Copy H5 to Capacitor www folder
        run: |
          rm -rf app/www
          cp -r miniapp/dist/h5 app/www

      - name: Install dependencies (app)
        working-directory: ./app
        run: npm install

      - name: Initialize Capacitor and Add Android
        working-directory: ./app
        run: |
          npx cap init "Campus Helper" "com.campus.helper" --web-dir=www || true
          npx cap add android || true
          npx cap sync

      - name: Setup Android Location Permissions
        working-directory: ./app
        run: node scripts/setup-android-permissions.js

      - name: Copy App Icons (Design A)
        working-directory: ./app
        run: |
          # 创建资源目录
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # 复制我们已经生成好的PNG图标
          if [ -d "android-icons" ]; then
            echo "复制图标..."
            cp android-icons/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/
            cp android-icons/mipmap-mdpi/ic_launcher_round.png android/app/src/main/res/mipmap-mdpi/
            cp android-icons/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/
            cp android-icons/mipmap-hdpi/ic_launcher_round.png android/app/src/main/res/mipmap-hdpi/
            cp android-icons/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/
            cp android-icons/mipmap-xhdpi/ic_launcher_round.png android/app/src/main/res/mipmap-xhdpi/
            cp android-icons/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/
            cp android-icons/mipmap-xxhdpi/ic_launcher_round.png android/app/src/main/res/mipmap-xxhdpi/
            cp android-icons/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/
            cp android-icons/mipmap-xxxhdpi/ic_launcher_round.png android/app/src/main/res/mipmap-xxxhdpi/
            echo "✅ 图标复制成功！"
          else
            echo "⚠️ android-icons 文件夹不存在，使用默认图标"
          fi

      - name: Make gradlew executable
        working-directory: ./app/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./app/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        with:
          files: app/android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v1.0.0-${{ steps.date.outputs.date }}
          name: Campus Helper APK v1.0.0 (${{ steps.date.outputs.date }})
          body: |
            ## Campus Helper Android App
            
            这是自动构建的 Debug APK，可以直接安装使用。
            
            ### 功能特性：
            - ✅ 校园互助任务发布和接单
            - ✅ 高德地图定位和导航（已修复定位权限！）
            - ✅ 用户认证和信用体系
            - ✅ 任务评价系统
            - ✅ 新图标（设计A）
            
            ### 测试账号：
            - 手机号：13800138000 ~ 13800138009
            - 验证码：123456
            
            ### 注意事项：
            - 这是 Debug 版本，仅供测试使用
            - 需要网络连接才能使用
            - 部分功能可能需要 VPN（Supabase 在国外）
            - 📍 定位已修复！首次打开请授予位置权限
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
