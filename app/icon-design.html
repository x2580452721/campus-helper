<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Helper App Icon Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        h1 {
            color: white;
            margin-bottom: 40px;
            font-size: 32px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .icon-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }
        
        .icon-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }
        
        .icon-card:hover {
            transform: translateY(-10px);
        }
        
        .icon-preview {
            width: 150px;
            height: 150px;
            border-radius: 34px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .icon-label {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .icon-size {
            color: #888;
            font-size: 14px;
        }
        
        .download-btn {
            margin-top: 15px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(6, 182, 212, 0.4);
        }
        
        .section-title {
            color: white;
            font-size: 24px;
            margin: 40px 0 20px 0;
            width: 100%;
            max-width: 1200px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🎓 Campus Helper App Icons</h1>
    
    <div class="section-title">主图标设计</div>
    <div class="icon-container">
        <div class="icon-card">
            <div class="icon-preview">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
                        </linearGradient>
                        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
                        </radialGradient>
                    </defs>
                    <rect width="1024" height="1024" fill="url(#grad1)" rx="180"/>
                    <circle cx="512" cy="512" r="400" fill="url(#glow)"/>
                    
                    <g transform="translate(512, 480)">
                        <polygon points="0,-120 200,40 0,120 -200,40" fill="#ffffff" opacity="0.95"/>
                        <circle cx="180" cy="50" r="35" fill="#ffffff" opacity="0.9"/>
                        <ellipse cx="0" cy="180" rx="80" ry="20" fill="#ffffff" opacity="0.9"/>
                        
                        <path d="M-40,180 Q0,280 40,180" stroke="#ffffff" stroke-width="16" fill="none" opacity="0.85" stroke-linecap="round"/>
                    </g>
                    
                    <g transform="translate(680, 280)">
                        <rect x="0" y="0" width="24" height="120" rx="12" fill="#ffffff" opacity="0.7"/>
                        <circle cx="12" cy="-10" r="20" fill="#ffffff" opacity="0.85"/>
                    </g>
                    
                    <g transform="translate(220, 250)">
                        <circle cx="0" cy="0" r="20" fill="#ffffff" opacity="0.5"/>
                    </g>
                    <g transform="translate(280, 780)">
                        <circle cx="0" cy="0" r="15" fill="#ffffff" opacity="0.4"/>
                    </g>
                </svg>
            </div>
            <div class="icon-label">设计 A - 简约渐变</div>
            <div class="icon-size">1024x1024</div>
        </div>
        
        <div class="icon-card">
            <div class="icon-preview" style="background: #ffffff;">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="1024" height="1024" fill="#f8fafc" rx="180"/>
                    
                    <g transform="translate(512, 450)">
                        <ellipse cx="0" cy="160" rx="320" ry="40" fill="url(#grad2)" opacity="0.15"/>
                        <ellipse cx="0" cy="130" rx="280" ry="35" fill="url(#grad2)" opacity="0.12"/>
                        <ellipse cx="0" cy="100" rx="240" ry="30" fill="url(#grad2)" opacity="0.1"/>
                        
                        <polygon points="0,-140 230,50 0,140 -230,50" fill="url(#grad2)"/>
                        <circle cx="210" cy="60" r="40" fill="url(#grad3)"/>
                        <ellipse cx="0" cy="200" rx="100" ry="25" fill="url(#grad2)"/>
                        
                        <path d="M-50,200 Q0,320 50,200" stroke="url(#grad3)" stroke-width="20" fill="none" stroke-linecap="round"/>
                    </g>
                    
                    <g transform="translate(700, 240)">
                        <rect x="0" y="0" width="28" height="140" rx="14" fill="url(#grad2)" opacity="0.8"/>
                        <circle cx="14" cy="-12" r="24" fill="url(#grad3)"/>
                    </g>
                </svg>
            </div>
            <div class="icon-label">设计 B - 浅色背景</div>
            <div class="icon-size">1024x1024</div>
        </div>
        
        <div class="icon-card">
            <div class="icon-preview">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#d946ef;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="1024" height="1024" fill="url(#grad4)" rx="180"/>
                    
                    <g transform="translate(512, 480)">
                        <polygon points="0,-110 180,35 0,110 -180,35" fill="#ffffff"/>
                        <circle cx="165" cy="45" r="32" fill="#fffbeb"/>
                        <ellipse cx="0" cy="165" rx="72" ry="18" fill="#ffffff"/>
                        
                        <path d="M-36,165 Q0,250 36,165" stroke="#fffbeb" stroke-width="14" fill="none" stroke-linecap="round"/>
                        
                        <g transform="translate(200, 200)">
                            <circle cx="0" cy="0" r="40" fill="#ffffff" opacity="0.2"/>
                        </g>
                        <g transform="translate(-200, 200)">
                            <circle cx="0" cy="0" r="40" fill="#ffffff" opacity="0.2"/>
                        </g>
                        <g transform="translate(0, -220)">
                            <circle cx="0" cy="0" r="50" fill="#ffffff" opacity="0.15"/>
                        </g>
                    </g>
                    
                    <g transform="translate(660, 270)">
                        <rect x="0" y="0" width="22" height="110" rx="11" fill="#ffffff" opacity="0.85"/>
                        <circle cx="11" cy="-10" r="18" fill="#fffbeb"/>
                    </g>
                </svg>
            </div>
            <div class="icon-label">设计 C - 活力粉紫</div>
            <div class="icon-size">1024x1024</div>
        </div>
    </div>
    
    <div class="section-title">替代图标设计</div>
    <div class="icon-container">
        <div class="icon-card">
            <div class="icon-preview">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="1024" height="1024" fill="url(#grad5)" rx="180"/>
                    
                    <g transform="translate(512, 420)">
                        <rect x="-140" y="-120" width="280" height="200" rx="24" fill="#ffffff" opacity="0.95"/>
                        <circle cx="0" cy="-160" r="60" fill="#ffffff" opacity="0.95"/>
                        
                        <rect x="-100" y="-70" width="200" height="14" rx="7" fill="url(#grad5)" opacity="0.6"/>
                        <rect x="-100" y="-35" width="150" height="14" rx="7" fill="url(#grad5)" opacity="0.4"/>
                        <rect x="-100" y="0" width="180" height="14" rx="7" fill="url(#grad5)" opacity="0.4"/>
                        <rect x="-100" y="35" width="120" height="14" rx="7" fill="url(#grad5)" opacity="0.3"/>
                        
                        <g transform="translate(100, 80)">
                            <rect x="-25" y="-10" width="50" height="12" rx="6" fill="#10b981"/>
                        </g>
                    </g>
                    
                    <g transform="translate(240, 780)">
                        <circle cx="0" cy="0" r="60" fill="#ffffff" opacity="0.15"/>
                    </g>
                    <g transform="translate(820, 220)">
                        <circle cx="0" cy="0" r="45" fill="#ffffff" opacity="0.12"/>
                    </g>
                </svg>
            </div>
            <div class="icon-label">设计 D - 任务卡片</div>
            <div class="icon-size">1024x1024</div>
        </div>
        
        <div class="icon-card">
            <div class="icon-preview">
                <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="1024" height="1024" fill="url(#grad6)" rx="180"/>
                    
                    <g transform="translate(512, 500)">
                        <g transform="translate(-160, -80)">
                            <rect x="0" y="0" width="140" height="180" rx="16" fill="#ffffff" opacity="0.95" transform="rotate(-8, 70, 90)"/>
                            <rect x="20" y="25" width="100" height="10" rx="5" fill="url(#grad6)" opacity="0.4"/>
                            <rect x="20" y="50" width="80" height="10" rx="5" fill="url(#grad6)" opacity="0.3"/>
                            <rect x="20" y="75" width="100" height="10" rx="5" fill="url(#grad6)" opacity="0.3"/>
                        </g>
                        
                        <g transform="translate(-50, -110)">
                            <rect x="0" y="0" width="140" height="180" rx="16" fill="#ffffff" opacity="0.98" transform="rotate(3, 70, 90)"/>
                            <rect x="20" y="25" width="100" height="10" rx="5" fill="url(#grad6)" opacity="0.5"/>
                            <rect x="20" y="50" width="90" height="10" rx="5" fill="url(#grad6)" opacity="0.4"/>
                            <rect x="20" y="75" width="100" height="10" rx="5" fill="url(#grad6)" opacity="0.4"/>
                            <rect x="20" y="100" width="70" height="10" rx="5" fill="url(#grad6)" opacity="0.3"/>
                        </g>
                        
                        <g transform="translate(70, -85)">
                            <rect x="0" y="0" width="140" height="180" rx="16" fill="#ffffff" opacity="0.92" transform="rotate(12, 70, 90)"/>
                            <rect x="20" y="25" width="100" height="10" rx="5" fill="url(#grad6)" opacity="0.35"/>
                            <rect x="20" y="50" width="85" height="10" rx="5" fill="url(#grad6)" opacity="0.25"/>
                        </g>
                        
                        <g transform="translate(0, -210)">
                            <polygon points="0,-40 60,15 0,40 -60,15" fill="#ffffff"/>
                        </g>
                    </g>
                </svg>
            </div>
            <div class="icon-label">设计 E - 书本堆叠</div>
            <div class="icon-size">1024x1024</div>
        </div>
    </div>

    <script>
        function downloadSVGAsPNG(svgElement, filename, size = 1024) {
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
        }

        document.querySelectorAll('.download-btn').forEach((btn, index) => {
            btn.addEventListener('click', function() {
                const card = this.closest('.icon-card');
                const svg = card.querySelector('svg');
                const label = card.querySelector('.icon-label').textContent;
                
                downloadSVGAsPNG(svg, `campus-helper-${label.replace(/\s+/g, '-')}.png`, 1024);
                setTimeout(() => {
                    downloadSVGAsPNG(svg, `campus-helper-${label.replace(/\s+/g, '-')}-512.png`, 512);
                }, 200);
                setTimeout(() => {
                    downloadSVGAsPNG(svg, `campus-helper-${label.replace(/\s+/g, '-')}-256.png`, 256);
                }, 400);
            });
        });
    </script>
</body>
</html>
